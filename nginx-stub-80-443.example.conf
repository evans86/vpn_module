# Пример: отдельный виртуальный хост с заглушкой на :80 и :443
# (скопируйте в конфиг Nginx / OpenServer и подставьте пути, ssl_certificate)
#
# Документ-root = каталог public/ Laravel, чтобы /123.rar отдавался как файл.
#
# openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout stub.key -out stub.crt -subj "/CN=localhost"
#
# Проверка: curl -k https://127.0.0.1/stub.html  и  curl -O http://127.0.0.1/123.rar

server {
    listen 80;
    listen [::]:80;
    # listen 80 default_server;
    server_name _;

    root "D:/OpenServer/domains/vpn/public";
    index stub.html;

    charset utf-8;

    location = /favicon.ico {
        return 204;
        access_log off;
    }

    location = /123.rar {
        alias "D:/OpenServer/domains/vpn/public/123.rar";
        default_type application/x-rar-compressed;
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        try_files $uri $uri/ /stub.html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # listen 443 ssl default_server;
    server_name _;

    root "D:/OpenServer/domains/vpn/public";
    index stub.html;

    charset utf-8;

    # ssl_certificate     "D:/path/stub.crt";
    # ssl_certificate_key "D:/path/stub.key";

    location = /favicon.ico {
        return 204;
        access_log off;
    }

    location = /123.rar {
        alias "D:/OpenServer/domains/vpn/public/123.rar";
        default_type application/x-rar-compressed;
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        try_files $uri $uri/ /stub.html;
    }
}
