# Пример server {} для Laravel (document root = public/).
#
# ЭТО ТОЛЬКО ОБРАЗЕЦ. Nginx не читает этот файл из каталога сайта после git pull.
# Скопируйте блоки location в активный конфиг: nginx -T | grep server_name
# Затем: nginx -t && systemctl reload nginx  (или service nginx reload)
#
# Заголовок x-node в ответе curl — часто ответ CDN (Cloudflare и т.п.), а не вашего сервера.
# Проверка без CDN: отключите прокси у записи A/AAAA в DNS или curl с --resolve на IP origin.
#
# Замените пути к сокету PHP-FPM и домен.
#
# ВАЖНО: HTTP 405 на POST /personal/* при этом curl:
#   curl -sI -X POST "https://example.com/personal/faq"
# чаще всего значит, что запрос НЕ доходит до PHP: nginx отдаёт статику
# или блокирует метод. Если существует ФАЙЛ или каталог public/personal/...
# с тем же URI, nginx для POST к статике часто отвечает 405 (GET/HEAD разрешены).
# Проверка на сервере: ls -la public_html/personal 2>/dev/null; find public_html -name faq
#
# Решение 1: удалить лишние файлы/папки под public/personal, если они не из Laravel.
# Решение 2: блок location ^~ /personal/ ниже — весь префикс только через index.php.

server {
    listen 80;
    server_name your_domain.com;
    root /path/to/your/public;
    index index.php;
    charset utf-8;

    # Редирект HTTP→HTTPS: 308 (не 301/302), иначе POST после редиректа превращается в GET.
    # return 308 https://$host$request_uri;

    # --- ЛК продавца: префикс /personal/ только через index.php (избегаем 405 на POST к «статике») ---
    # Не используйте ^~ /personal без слэша — иначе совпадёт с /personalities и т.п.
    location ^~ /personal/ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_hide_header X-Powered-By;
    }

    # Если положите статику именно под /personal/, сначала добавьте более узкие location для файлов.

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
