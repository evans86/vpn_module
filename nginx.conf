server {
    listen 80;
    server_name your_domain.com;  # Замените на ваш домен
    root /path/to/your/public;    # Замените на путь к public директории

    index index.php;

    # Редирект HTTP→HTTPS: используйте return 308 (а не 301/302), иначе POST-формы превращаются в GET и дают 405 в Laravel.
    # Пример: return 308 https://$host$request_uri;

    # POST (формы Laravel) должен попадать в index.php через try_files; иначе nginx отдаёт 405.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;  # Измените версию PHP если нужно
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Запрещаем доступ к .htaccess и другим скрытым файлам
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
