# =============================================================================
# Заглушка на IP / несовпавший Host (антискан, «пустой» ответ при блокировках)
# =============================================================================
# Подключение на сервере с панелями (Ubuntu/Debian + nginx):
#
#   1) Скопируйте каталог stub-assets на сервер, например:
#        /var/www/panel-stub/
#      В нём должны быть: index.html, (опционально) 123.rar
#
#   2) Сгенерируйте самоподписанный сертификат ТОЛЬКО для заглушки на 443:
#        sudo mkdir -p /etc/nginx/ssl
#        sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#          -keyout /etc/nginx/ssl/panel-stub.key \
#          -out /etc/nginx/ssl/panel-stub.crt \
#          -subj "/CN=localhost"
#
#   3) Положите этот файл в:
#        /etc/nginx/conf.d/00-panel-stub-default.conf
#      (имя с 00-, чтобы шёл раньше произвольных server, НО после real name-based
#       vhost чаще задают server_name и default отдельно — см. ниже.)
#
#   4) Проверка и перезагрузка:
#        sudo nginx -t && sudo systemctl reload nginx
#
# Как это работает:
#   - default_server — ловит запросы на :80 / :443 по IP и «левые» Host,
#     если нет более подходящего server {}.
#   - Реальные панели вешайте на отдельные server_name (домены), БЕЗ default_server.
#   - Порядок: сначала добавьте заглушку, затем vhost’ы с panel.example.com — у них
#     выше приоритет по имени хоста.
#
# Опционально: server_tokens off; уже в http {} в nginx.conf — не светить версию.
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/panel-stub;
    index index.html;

    charset utf-8;
    server_tokens off;

    access_log /var/log/nginx/panel-stub-access.log;
    error_log  /var/log/nginx/panel-stub-error.log;

    location = /favicon.ico {
        default_type image/x-icon;
        return 204;
        access_log off;
    }

    # «Мусорный» тяжёлый файл — по желанию (сгенерировать: deploy/stub-assets/generate-123-rar.sh)
    location = /123.rar {
        alias /var/www/panel-stub/123.rar;
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff;
    }

    # HOST_TEST_SPEED_BEGIN — только хост nginx + fcgiwrap (в Docker не подключаем)
    include /etc/nginx/snippets/panel-stub-test-speed.inc;
    # HOST_TEST_SPEED_END

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    # Без http2 на этом default_server: иначе на части сборок nginx цепочка HTTP/2 + fastcgi_wrap даёт 502 на /test-speed при том, что статика по HTTPS ок.
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    root /var/www/panel-stub;
    index index.html;

    charset utf-8;
    server_tokens off;

    ssl_certificate     /etc/nginx/ssl/panel-stub.crt;
    ssl_certificate_key /etc/nginx/ssl/panel-stub.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/panel-stub-ssl-access.log;
    error_log  /var/log/nginx/panel-stub-ssl-error.log;

    location = /favicon.ico {
        default_type image/x-icon;
        return 204;
        access_log off;
    }

    location = /123.rar {
        alias /var/www/panel-stub/123.rar;
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff;
    }

    # HOST_TEST_SPEED_BEGIN — только хост nginx + fcgiwrap (в Docker не подключаем)
    include /etc/nginx/snippets/panel-stub-test-speed.inc;
    # HOST_TEST_SPEED_END

    location / {
        try_files $uri $uri/ /index.html;
    }
}
